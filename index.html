<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Bee</title>
    <style>
        body {
            font-size: 18px;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .chat-drawer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: auto;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px;
        }
        .board {
            width: 80vw;
            height: 80vh;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ccc;
            background-color: #fff;
            border-radius: 4px;
        }
        .sidebar {
            display: none;  /* Removed sidebar chats */
        }
    </style>
</head>
<body>
    <div class="board">
        <!-- Board content goes here -->
    </div>
    <div class="chat-drawer">
        <!-- Chat content goes here -->
    </div>
</body>
</html>
